name: Build Multi-Platform

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            arch: x86_64
            artifact_name: 迅鲨加速器-Windows-x64
            artifact_zip: 迅鲨加速器-v1.0.0-Windows-x64.zip
          - os: macos-14
            label: macOS-arm64
            arch: arm64
            artifact_name: 迅鲨加速器-macOS-arm64
            artifact_zip: 迅鲨加速器-v1.0.0-macOS-arm64.zip
          - os: macos-13
            label: macOS-x86_64
            arch: x86_64
            artifact_name: 迅鲨加速器-macOS-x64
            artifact_zip: 迅鲨加速器-v1.0.0-macOS-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Display environment
        shell: bash
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "Runner: $(uname -a 2>/dev/null || ver)"

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python build_exe.py
          if (Test-Path "release/迅鲨加速器-v1.0.0") {
            Compress-Archive -Path "release/迅鲨加速器-v1.0.0/*" -DestinationPath "${{ matrix.artifact_zip }}" -Force
            Write-Host "Created ${{ matrix.artifact_zip }}"
          } else {
            Write-Host "release folder not found, listing dist:"
            Get-ChildItem dist
          }

      - name: Build macOS
        if: startsWith(matrix.os, 'macos')
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python build_macos.py
          echo "===== Build output ====="
          ls -la dist/ 2>/dev/null || echo "no dist folder"
          if [ -d "dist/迅鲨加速器.app" ]; then
            cd dist
            zip -r "../${{ matrix.artifact_zip }}" "迅鲨加速器.app"
            cd ..
            echo "Created ${{ matrix.artifact_zip }}"
          else
            echo "App bundle not found"
            ls -la
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_zip }}
            dist/**
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "===== Artifacts ====="
          ls -la artifacts/
          find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
